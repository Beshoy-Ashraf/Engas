<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطأ - Engas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="error-page">
    <!-- Animated Background -->
    <div class="error-bg">
        <div class="bg-blob blob-1" style="background: #ff4757;"></div>
        <div class="bg-blob blob-2" style="background: #ff6b7a;"></div>
        <div class="bg-blob blob-3" style="background: #ff3838;"></div>
        <div class="bg-grid"></div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle-modern" id="themeToggle" title="تبديل المظهر">
        <div class="toggle-slider">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun"></i>
        </div>
    </div>

    <!-- Error Content -->
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle" id="errorIcon"></i>
            </div>
            <h1 id="errorCode">500</h1>
            <h2 id="errorTitle">حدث خطأ غير متوقع</h2>
            <p id="errorMessage">الرجاء المحاولة مرة أخرى بعد قليل. إذا استمر الخطأ، تواصل مع الدعم الفني.</p>
            
            <div class="error-actions">
                <a href="../index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i>
                    العودة للرئيسية
                </a>
                <a href="javascript:window.history.back()" class="btn btn-secondary">
                    <i class="fas fa-arrow-right"></i>
                    السابق
                </a>
            </div>

            <div class="error-support">
                <h3>في حالة استمرار المشكلة:</h3>
                <div class="support-info">
                    <div class="support-item">
                        <i class="fas fa-phone"></i>
                        <span>010-1234-5678</span>
                    </div>
                    <div class="support-item">
                        <i class="fas fa-envelope"></i>
                        <span>support@engas.com</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
            themeToggle.classList.toggle('light');
        });

        // Error state from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const errorCode = urlParams.get('code') || 500;
        const errorTitle = urlParams.get('title') || 'حدث خطأ غير متوقع';
        const errorMessage = urlParams.get('message') || 'الرجاء المحاولة مرة أخرى بعد قليل.';

        document.getElementById('errorCode').textContent = errorCode;
        document.getElementById('errorTitle').textContent = errorTitle;
        document.getElementById('errorMessage').textContent = errorMessage;

        // Error specific icons
        const icons = {
            '404': 'fas fa-search',
            '500': 'fas fa-exclamation-triangle',
            '403': 'fas fa-ban',
            '401': 'fas fa-user-slash',
            'default': 'fas fa-bug'
        };
        document.getElementById('errorIcon').className = icons[errorCode] || icons['default'];

        // Add shake animation on load
        document.querySelector('.error-card').style.animation = 'shake 0.5s ease-in-out';
    </script>

    <style>
        /* Error Page Specific Styles */
    .error-page {
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .error-bg .bg-blob {
            animation: blobError 15s ease-in-out infinite;
        }

        @keyframes blobError {
            0%, 100% { transform: scale(1) translateX(0); }
            50% { transform: scale(1.05) translateX(20px); }
        }

        .error-container {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
        }

        .error-card {
            background: var(--glass-bg, rgba(15, 15, 15, 0.95));
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border, rgba(255, 71, 87, 0.2));
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 80px rgba(255, 71, 87, 0.15);
            position: relative;
            overflow: hidden;
            animation: cardFloat 4s ease-in-out infinite;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .error-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 71, 87, 0.03) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: 0;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .error-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            font-size: 80px;
            color: #ff4757;
            opacity: 0.9;
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .error-card h1 {
            font-size: 96px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4757, #ff6b7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -2px;
        }

        .error-card h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .error-card p {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 500px;
            margin-right: auto;
            margin-left: auto;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            min-width: 160px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(58, 124, 165, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(58, 124, 165, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--glass-border);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .error-support {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
        }

        .error-support h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            text-align: center;
        }

        .support-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .support-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .support-item:hover {
            background: rgba(58, 124, 165, 0.1);
            transform: translateX(-4px);
        }

        .support-item i {
            font-size: 18px;
            color: var(--primary);
            width: 32px;
            text-align: center;
        }

        .support-item span {
            font-weight: 500;
            color: var(--text-primary);
        }

        /* Responsive - No Scroll, Perfect Fit */
        @media (max-width: 1200px) {
            .error-icon {
                width: 100px;
                height: 100px;
                font-size: 70px;
            }
            
            .error-card h1 {
                font-size: 80px;
            }
            
            .error-card h2 {
                font-size: 24px;
            }
        }

        @media (max-width: 768px) {
            .error-page {
                padding: 15px;
            }

            .error-card {
                padding: 32px 24px;
                gap: 20px;
                margin: 0;
            }

            .error-icon {
                width: 90px;
                height: 90px;
                font-size: 60px;
            }

            .error-card h1 {
                font-size: 64px;
                letter-spacing: -1px;
            }

            .error-card h2 {
                font-size: 22px;
            }

            .error-actions {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                width: 100%;
                padding: 14px;
            }

            .error-support {
                padding: 20px 16px;
            }

            .support-info {
                gap: 10px;
            }

            .support-item {
                padding: 12px 10px;
                flex-direction: column;
                gap: 6px;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .error-card {
                padding: 24px 20px;
                gap: 16px;
            }

            .error-icon {
                width: 80px;
                height: 80px;
                font-size: 50px;
            }

            .error-card h1 {
                font-size: 52px;
            }

            .error-card h2 {
                font-size: 20px;
            }

            .error-support h3 {
                font-size: 15px;
            }
        }

        /* Theme support */
        [data-theme="light"] .error-card {
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(255, 71, 87, 0.15);
            box-shadow: 0 25px 80px rgba(255, 71, 87, 0.1);
        }

        [data-theme="light"] .support-item {
            background: rgba(58, 124, 165, 0.05);
        }

        [data-theme="light"] .support-item:hover {
            background: rgba(58, 124, 165, 0.1);
        }
    </style>
</body>
</html>
