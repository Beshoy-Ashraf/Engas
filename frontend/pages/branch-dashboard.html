<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الفرع - Engas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Branch Dashboard Specific Styles */
        .branch-header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .branch-header-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .branch-header-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .branch-header-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .branch-header-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .branch-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .branch-status.active {
            background: rgba(93, 214, 44, 0.15);
            color: #5DD62C;
        }
        
        .branch-status.inactive {
            background: rgba(255, 74, 74, 0.15);
            color: #FF4A4A;
        }
        
        .branch-status.pending {
            background: rgba(242, 201, 76, 0.15);
            color: #F2C94C;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        /* Product Form Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .modal-close {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        
        .modal-close:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.2s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-input::placeholder {
            color: var(--text-muted);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: var(--primary);
            border: 1px solid var(--primary);
            color: var(--text-primary);
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
            border-color: var(--primary-light);
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
        }
        
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        /* Products Grid */
        .products-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .search-box i {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            z-index: 1;
        }
        
        .search-box input {
            padding-left: 36px !important;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .product-card:hover {
            transform: translateY(-3px);
            border-color: rgba(58, 124, 165, 0.3);
        }
        
        .product-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .product-id {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--stat-bg);
            padding: 4px 10px;
            border-radius: 6px;
        }
        
        .product-actions {
            display: flex;
            gap: 6px;
        }
        
        .product-action-btn {
            background: transparent;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        
        .product-action-btn:hover {
            color: var(--text-primary);
        }
        
        .product-action-btn.edit:hover {
            background: rgba(242, 201, 76, 0.15);
            color: #F2C94C;
        }
        
        .product-action-btn.delete:hover {
            background: rgba(255, 74, 74, 0.15);
            color: #FF4A4A;
        }
        
        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .product-model {
            font-size: 13px;
            color: var(--primary);
            margin-bottom: 16px;
        }
        
        .product-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border);
        }
        
        .product-stat {
            text-align: center;
        }
        
        .product-stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .product-stat-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .product-stat-value.price {
            color: var(--primary);
        }
        
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            background: var(--glass-bg);
            border: 1px dashed var(--glass-border);
            border-radius: 16px;
        }
        
        .empty-state i {
            font-size: 48px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        
        .empty-state h3 {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .empty-state p {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        /* Recent Orders */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .order-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
        }
        
        .order-card:hover {
            border-color: rgba(58, 124, 165, 0.3);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .order-id {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .order-status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .order-status.completed {
            background: rgba(93, 214, 44, 0.15);
            color: #5DD62C;
        }
        
        .order-status.pending {
            background: rgba(242, 201, 76, 0.15);
            color: #F2C94C;
        }
        
        .order-status.cancelled {
            background: rgba(255, 74, 74, 0.15);
            color: #FF4A4A;
        }
        
        .order-products {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .order-product {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        
        .order-product-info {
            color: var(--text-secondary);
        }
        
        .order-product-quantity {
            color: var(--text-muted);
        }
        
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--glass-border);
        }
        
        .order-total {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary);
        }
        
        .order-payment {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .branch-header-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .section-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .products-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box input {
                width: 100% !important;
            }
            
            #filterSelect {
                width: 100% !important;
            }
            
            #addProductBtn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="site-logo">
            <img src="../img/logo.png" alt="Engas Logo">
        </div>
        <ul class="nav-menu">
            <!-- <li class="nav-item">
                <a href="../index.html" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>الرئيسية</span>
                </a>
            </li> -->
            <li class="nav-item">
                <a href="branch-dashboard.html" class="nav-link active">
                    <i class="fas fa-store"></i>
                    <span>لوحة الفرع</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-box"></i>
                    <span>الأصناف</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-shopping-cart"></i>
                    <span>الطلبات</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-chart-bar"></i>
                    <span>التقارير</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>الإعدادات</span>
                </a>
            </li>
        </ul>
    </nav>

    <main class="main-content" id="mainContent">
        <div class="top-bar">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="page-title">لوحة تحكم الفرع</h1>
            <div class="theme-toggle-modern" id="themeToggle" title="تبديل المظهر">
                <div class="toggle-slider">
                    <i class="fas fa-moon"></i>
                    <i class="fas fa-sun"></i>
                </div>
            </div>
        </div>

        <!-- Branch Info Section -->
        <div class="branch-header">
            <div class="branch-header-grid">
                <div class="branch-header-item">
                    <span class="branch-header-label">اسم الفرع</span>
                    <span class="branch-header-value" id="branchName">العامرية كوبرى</span>
                </div>
                <div class="branch-header-item">
                    <span class="branch-header-label">كود الفرع</span>
                    <span class="branch-header-value">7006</span>
                </div>
                <div class="branch-header-item">
                    <span class="branch-header-label">الحالة</span>
                    <span class="branch-status active">
                        <i class="fas fa-circle"></i>
                        نشط
                    </span>
                </div>
                <div class="branch-header-item">
                    <span class="branch-header-label">مدير الفرع</span>
                    <span class="branch-header-value">أحمد محمد</span>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-box"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalProducts">0</h3>
                    <p>إجمالي الأصناف</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-tag"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalProductsValue">0</h3>
                    <p>إجمالي قيمة الأصناف</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <div class="stat-info">
                    <h3 id="todayOrders">0</h3>
                    <p>الطلبات اليوم</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-calendar-alt"></i>
                </div>
                <div class="stat-info">
                    <h3 id="monthOrders">0</h3>
                    <p>الطلبات الشهر</p>
                </div>
            </div>
        </section>

        <!-- Products Section -->
        <section class="products-section">
            <div class="section-header">
                <h2 class="section-title">الأصناف</h2>
                <div class="products-controls">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" class="form-input" id="searchInput" placeholder="ابحث في الأجهزة والمنتجات..." style="padding-left: 36px; width: 200px;">
                    </div>
                    <select class="form-input" id="filterSelect" style="width: 150px;">
                        <option value="all">جميع الأصناف</option>
                        <option value="phones">هواتف</option>
                        <option value="screens">شاشات</option>
                        <option value="accessories">إكسسوارات</option>
                        <option value="chargers">شواحن وكابلات</option>
                    </select>
                    <button class="btn btn-primary" id="addProductBtn">
                        <i class="fas fa-plus"></i>
                        إضافة منتج
                    </button>
                </div>
            </div>
            <div class="products-grid" id="productsGrid">
                <!-- Products will be rendered here -->
            </div>
        </section>

        <!-- Recent Orders Section -->
        <section class="orders-section" style="margin-top: 30px;">
            <div class="section-header">
                <h2 class="section-title">أحدث الطلبات</h2>
            </div>
            <div class="orders-list" id="ordersList">
                <!-- Orders will be rendered here -->
            </div>
        </section>
    </main>

    <!-- Add/Edit Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">إضافة منتج جديد</h3>
                <button class="modal-close" id="modalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId" value="">
                <div class="form-group">
                    <label class="form-label">اسم المنتج *</label>
                    <input type="text" class="form-input" id="productName" placeholder="مثال: هاتف iPhone 15 Pro Max" required>
                </div>
                <div class="form-group">
                    <label class="form-label">الموديل</label>
                    <input type="text" class="form-input" id="productModel" placeholder="مثال: 512GB - أسود">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">الكمية</label>
                        <input type="number" class="form-input" id="productQuantity" placeholder="0" min="0" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">السعر (ج.م)</label>
                        <input type="number" class="form-input" id="productPrice" placeholder="0.00" min="0" step="0.01" required>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">إلغاء</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">
                        <i class="fas fa-save"></i>
                        حفظ
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/branch-dashboard.js"></script>
</body>
</html>
