<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأفرع - Engas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="branches-page ">
    <!-- Animated Background -->
    <div class="branches-bg">
        <div class="bg-blob blob-1"></div>
        <div class="bg-blob blob-2"></div>
        <div class="bg-blob blob-3"></div>
        <div class="bg-grid"></div>
    </div>

    <!-- Floating Theme Toggle -->
    <div class="theme-toggle-modern" id="themeToggle" title="تبديل المظهر">
        <div class="toggle-slider">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun"></i>
        </div>
    </div>

    <!-- Top Navigation -->
    <nav class="branches-nav">
        <div class="nav-content">
            <a href="../index.html" class="nav-brand">
                <div class="brand-icon">
                    <i class="fas fa-code-branch"></i>
                </div>
                <span class="brand-text">Engas</span>
            </a>
            <div class="nav-actions">
                <button class="btn-icon" title="إضافة فرع جديد" onclick="openAddModal()">
                    <i class="fas fa-plus-circle"></i>
                </button>
                <a href="../index.html" class="nav-back">
                    <i class="fas fa-arrow-right"></i>
                    <span>العودة للرئيسية</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="branches-main">
        <div class="branches-wrapper">
            <!-- Page Header -->
            <div class="page-header">
                <div class="header-content">
                    <h1><i class="fas fa-code-branch"></i> إدارة الفروع</h1>
                    <p>عرض وإدارة جميع فروع النظام</p>
                </div>
                <div class="header-stats">
                    <div class="stat-chip">
                        <i class="fas fa-building"></i>
                        <span id="totalCount">0</span>
                        <span>فرع</span>
                    </div>
                    <div class="stat-chip active">
                        <i class="fas fa-check-circle"></i>
                        <span id="activeCount">0</span>
                        <span>نشط</span>
                    </div>
                </div>
            </div>

            <!-- Search & Filter Bar -->
            <div class="filter-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="البحث بالاسم،الكود،أو الموقع..." oninput="filterBranches()">
                </div>
                <div class="filter-options">
                    <select id="statusFilter" onchange="filterBranches()">
                        <option value="all">جميع الحالات</option>
                        <option value="active">نشط</option>
                        <option value="inactive">غير نشط</option>
                    </select>
                    <button class="btn-filter" onclick="toggleSortMenu()">
                        <i class="fas fa-sort"></i>
                        ترتيب
                    </button>
                </div>
            </div>

            <!-- Branches Grid -->
            <div class="branches-grid" id="branchesGrid">
                <!-- Cards will be generated by JS -->
            </div>

            <!-- No Results Message -->
            <div class="no-results" id="noResults" style="display: none;">
                <i class="fas fa-search"></i>
                <h3>لا توجد نتائج</h3>
                <p>لم يتم العثور على فروع مطابقة لبحثك</p>
            </div>
        </div>
    </main>

    <!-- Branch Detail Modal -->
    <div class="modal-overlay" id="branchDetailModal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2><i class="fas fa-code-branch"></i> بيانات الفرع</h2>
                <button class="modal-close" onclick="closeDetailModal()">&times;</button>
            </div>
            <div class="modal-body" id="branchDetailBody">
                <!-- Content will be generated by JS -->
            </div>
        </div>
    </div>

    <!-- Add Branch Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-plus-circle"></i> إضافة فرع جديد</h2>
                <button class="modal-close" onclick="closeAddModal()">&times;</button>
            </div>
            <form class="auth-form" id="addBranchForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">اسم الفرع *</label>
                        <input type="text" class="form-input" name="branchName" required placeholder="مثال: الفرع الرئيسي">
                    </div>
                    <div class="form-group">
                        <label class="form-label">كود الفرع *</label>
                        <input type="text" class="form-input" name="branchCode" required placeholder="مثال: BR-001">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">رقم الهاتف *</label>
                        <input type="tel" class="form-input" name="branchPhone" required placeholder="01x-xxx-xxxx">
                    </div>
                    <div class="form-group">
                        <label class="form-label">مدير الفرع *</label>
                        <input type="text" class="form-input" name="branchManager" required placeholder="اسم مدير الفرع">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">المحافظة *</label>
                    <select class="form-select" name="branchGovernorate" required>
                        <option value="" disabled selected>اختر المحافظة</option>
                        <option value="القاهرة">القاهرة</option>
                        <option value="الجيزة">الجيزة</option>
                        <option value="الإسكندرية">الإسكندرية</option>
                        <option value="الدقهلية">الدقهلية</option>
                        <option value="البحر الأحمر">البحر الأحمر</option>
                        <option value="البحيرة">البحيرة</option>
                        <option value="الفيوم">الفيوم</option>
                        <option value="الغربية">الغربية</option>
                        <option value="الإسماعيلية">الإسماعيلية</option>
                        <option value="المنوفية">المنوفية</option>
                        <option value="المنيا">المنيا</option>
                        <option value="القليوبية">القليوبية</option>
                        <option value="الوادي الجديد">الوادي الجديد</option>
                        <option value="السويس">السويس</option>
                        <option value="أسوان">أسوان</option>
                        <option value="أسيوط">أسيوط</option>
                        <option value="بني سويف">بني سويف</option>
                        <option value="بورسعيد">بورسعيد</option>
                        <option value="دمياط">دمياط</option>
                        <option value="الشرقية">الشرقية</option>
                        <option value="جنوب سيناء">جنوب سيناء</option>
                        <option value="كفر الشيخ">كفر الشيخ</option>
                        <option value="مطروح">مطروح</option>
                        <option value="الأقصر">الأقصر</option>
                        <option value="قنا">قنا</option>
                        <option value="شمال سيناء">شمال سيناء</option>
                        <option value="سوهاج">سوهاج</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">المنطقة / العنوان *</label>
                    <input type="text" class="form-input" name="branchAddress" placeholder="المدينة - الحي - الشارع" required>
                </div>
                <div class="form-group">
                    <label class="form-label">الحالة</label>
                    <select class="form-select" name="branchStatus">
                        <option value="active">نشط</option>
                        <option value="inactive">غير نشط</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeAddModal()">إلغاء</button>
                    <button type="submit" class="btn btn-submit">حفظ الفرع</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Branch Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> تعديل بيانات الفرع</h2>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <form class="auth-form" id="editBranchForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">اسم الفرع *</label>
                        <input type="text" class="form-input" name="branchName" required placeholder="اسم الفرع">
                    </div>
                    <div class="form-group">
                        <label class="form-label">كود الفرع *</label>
                        <input type="text" class="form-input" name="branchCode" required placeholder="كود الفرع">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">رقم الهاتف *</label>
                        <input type="tel" class="form-input" name="branchPhone" required placeholder="رقم الهاتف">
                    </div>
                    <div class="form-group">
                        <label class="form-label">مدير الفرع *</label>
                        <input type="text" class="form-input" name="branchManager" required placeholder="اسم المدير">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">المحافظة *</label>
                    <select class="form-select" name="branchGovernorate" required>
                        <option value="" disabled>اختر المحافظة</option>
                        <option value="القاهرة">القاهرة</option>
                        <option value="الجيزة">الجيزة</option>
                        <option value="الإسكندرية">الإسكندرية</option>
                        <option value="الدقهلية">الدقهلية</option>
                        <option value="البحر الأحمر">البحر الأحمر</option>
                        <option value="البحيرة">البحيرة</option>
                        <option value="الفيوم">الفيوم</option>
                        <option value="الغربية">الغربية</option>
                        <option value="الإسماعيلية">الإسماعيلية</option>
                        <option value="المنوفية">المنوفية</option>
                        <option value="المنيا">المنيا</option>
                        <option value="القليوبية">القليوبية</option>
                        <option value="الوادي الجديد">الوادي الجديد</option>
                        <option value="السويس">السويس</option>
                        <option value="أسوان">أسوان</option>
                        <option value="أسيوط">أسيوط</option>
                        <option value="بني سويف">بني سويف</option>
                        <option value="بورسعيد">بورسعيد</option>
                        <option value="دمياط">دمياط</option>
                        <option value="الشرقية">الشرقية</option>
                        <option value="جنوب سيناء">جنوب سيناء</option>
                        <option value="كفر الشيخ">كفر الشيخ</option>
                        <option value="مطروح">مطروح</option>
                        <option value="الأقصر">الأقصر</option>
                        <option value="قنا">قنا</option>
                        <option value="شمال سيناء">شمال سيناء</option>
                        <option value="سوهاج">سوهاج</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">المنطقة / العنوان *</label>
                    <input type="text" class="form-input" name="branchAddress" placeholder="الموقع التفصيلي" required>
                </div>
                <div class="form-group">
                    <label class="form-label">الحالة *</label>
                    <select class="form-select" name="branchStatus" required>
                        <option value="active">نشط</option>
                        <option value="inactive">غير نشط</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeEditModal()">إلغاء</button>
                    <button type="submit" class="btn btn-submit">حفظ التغييرات</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h2 style="color: #ff4757;"><i class="fas fa-exclamation-triangle"></i> تأكيد الحذف</h2>
                <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
            </div>
            <div class="modal-body" style="text-align: center; padding: 20px 0;">
                <div style="font-size: 60px; color: #ff4757; margin-bottom: 20px;">
                    <i class="fas fa-trash-alt"></i>
                </div>
                <h3 style="margin-bottom: 12px; color: var(--text-primary);">هل أنت متأكد؟</h3>
                <p style="color: var(--text-muted); margin-bottom: 8px;">لا يمكن التراجع عن هذا الإجراء</p>
                <p style="color: var(--text-secondary); font-weight: 600;">
                    سيتم حذف الفرع: <span id="deleteBranchName" style="color: var(--text-primary);"></span>
                </p>
                <div class="form-actions" style="margin-top: 28px; justify-content: center;">
                    <button type="button" class="btn btn-cancel" onclick="closeDeleteModal()">إلغاء</button>
                    <button type="button" class="btn btn-submit" style="background: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);" onclick="confirmDelete()">
                        <i class="fas fa-trash"></i>
                        <span>تأكيد الحذف</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-notification" id="successToast">
        <div class="toast-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <div class="toast-content">
            <h4>تم بنجاح</h4>
            <p id="toastMessage">تمت العملية بنجاح</p>
        </div>
        <button class="toast-close" id="toastClose" onclick="hideToast()">&times;</button>
    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/branches.js"></script>
</body>
</html>
