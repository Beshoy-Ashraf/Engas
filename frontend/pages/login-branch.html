<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engas - تسجيل دخول الأفرع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-type-toggle">
            <button class="toggle-btn" data-type="staff" onclick="location.href='login-staff.html'">
                <i class="fas fa-user-tie"></i>
                الموظفين
            </button>
            <button class="toggle-btn active" data-type="branch">
                <i class="fas fa-code-branch"></i>
                الأفرع
            </button>
        </div>

        <div class="login-card glass-card">
            <div class="login-logo">
                <img src="../img/logo.png" alt="Engas Logo">
            </div>
            <h2 class="login-title">تسجيل دخول الفرع</h2>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="storeId">
                        <i class="fas fa-store"></i>
                        رقم المتجر
                    </label>
                    <input type="text" id="storeId" name="storeId" placeholder="أدخل رقم المتجر" required>
                </div>
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        كلمة المرور
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>تذكرني</span>
                    </label>
                    <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
                </div>
                <button type="submit" class="login-btn">
                    <span>دخول الفرع</span>
                    <i class="fas fa-arrow-left"></i>
                </button>
            </form>
        </div>
    </div>

    <div class="theme-toggle-modern" id="themeToggle" title="تبديل المظهر">
        <div class="toggle-slider">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun"></i>
        </div>
    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
